# Tails sales_order_store's and sales_order_processor's app.log / metrics.log files and
# ships them to the OpenSearch container for the ICP console's Logs and Metrics pages.
# Runs as the `fluent-bit` service in ../docker-compose.yml, which mounts the sample's
# shared ../logs dir at /var/log/ballerina (one subdirectory per package: app.log +
# metrics.log written by each package's Config.toml) and this directory at
# /fluent-bit/etc. See docs: manage/icp/observability-setup.md.
#
# The /var/log/<x>/<app-name>/ layout is required by scripts/scripts.lua's
# extract_app_from_path, which derives app_name/service_type from the path.

[SERVICE]
    Flush        1
    Parsers_File parsers.conf
    Log_Level    info

# ── App logs (sales_order_store + sales_order_processor) ──
# No Parser here: preprocess_bal_log (below) needs the raw line in record["log"],
# which only exists before any parser has run.
[INPUT]
    Name           tail
    Path           /var/log/ballerina/*/app.log
    Tag            ballerina_app_logs
    Read_from_Head On
    Path_Key       log_file_path

# ── Metrics logs ──
[INPUT]
    Name           tail
    Path           /var/log/ballerina/*/metrics.log
    Tag            ballerina_metrics
    Read_from_Head On
    Path_Key       log_file_path

# ── Pre-process + parse ──
# Ballerina logfmt lines can contain key={...} / key=[...] JSON values (e.g. `error={...}`
# on any failed sales order). Plain logfmt parsing corrupts on the embedded braces/quotes
# and drops that field plus everything after it. preprocess_bal_log lifts those values out
# of the raw line first so the `parser` FILTER below only ever sees clean key=value pairs.
[FILTER]
    Name    lua
    Match   ballerina_app_logs
    Script  scripts/scripts.lua
    Call    preprocess_bal_log

[FILTER]
    Name    lua
    Match   ballerina_metrics
    Script  scripts/scripts.lua
    Call    preprocess_bal_log

[FILTER]
    Name          parser
    Match         ballerina_app_logs
    Key_Name      log
    Parser        bal_logfmt_parser
    Reserve_Data  On

[FILTER]
    Name          parser
    Match         ballerina_metrics
    Key_Name      log
    Parser        bal_logfmt_parser
    Reserve_Data  On

# ── Enrich app logs ──
[FILTER]
    Name    lua
    Match   ballerina_app_logs
    Script  scripts/scripts.lua
    Call    extract_app_from_path

[FILTER]
    Name    lua
    Match   ballerina_app_logs
    Script  scripts/scripts.lua
    Call    enrich_bal_logs

[FILTER]
    Name    lua
    Match   ballerina_app_logs
    Script  scripts/scripts.lua
    Call    construct_bal_app_name

# ── Enrich metrics logs ──
[FILTER]
    Name    lua
    Match   ballerina_metrics
    Script  scripts/scripts.lua
    Call    extract_app_from_path

[FILTER]
    Name    lua
    Match   ballerina_metrics
    Script  scripts/scripts.lua
    Call    enrich_bal_logs

[FILTER]
    Name    lua
    Match   ballerina_metrics
    Script  scripts/scripts.lua
    Call    construct_bal_app_name

[FILTER]
    Name    lua
    Match   ballerina_metrics
    Script  scripts/scripts.lua
    Call    extract_bal_metrics_data

# ── Document IDs (deduplication) ──
[FILTER]
    Name          lua
    Match         ballerina_app_logs
    Script        scripts/scripts.lua
    Call          generate_document_id
    time_as_table true

[FILTER]
    Name          lua
    Match         ballerina_metrics
    Script        scripts/scripts.lua
    Call          generate_document_id
    time_as_table true

# ── Outputs ──
# Security plugin is enabled on the demo OpenSearch container (see ../docker-compose.yml):
# HTTPS with its bundled self-signed demo cert (tls.verify Off) and admin/OPENSEARCH_PASSWORD
# auth (${OPENSEARCH_PASSWORD}, set as an env var on the fluent-bit service). Use a properly
# signed cert and tls.verify On for anything beyond local evaluation.
[OUTPUT]
    Name               opensearch
    Match              ballerina_app_logs
    Host               opensearch
    Port               9200
    Logstash_Format    On
    Logstash_Prefix    ballerina-application-logs
    Replace_Dots       On
    Suppress_Type_Name On
    Id_Key             doc_id
    tls                On
    tls.verify         Off
    HTTP_User          admin
    HTTP_Passwd        ${OPENSEARCH_PASSWORD}

[OUTPUT]
    Name               opensearch
    Match              ballerina_metrics
    Host               opensearch
    Port               9200
    Logstash_Format    On
    Logstash_Prefix    ballerina-metrics-logs
    Replace_Dots       On
    Suppress_Type_Name On
    Id_Key             doc_id
    tls                On
    tls.verify         Off
    HTTP_User          admin
    HTTP_Passwd        ${OPENSEARCH_PASSWORD}
