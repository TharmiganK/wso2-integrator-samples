services:
  solace:
    image: solace/solace-pubsub-standard:latest
    container_name: demo-solace
    hostname: demo-solace
    shm_size: 1g
    ulimits:
      core: -1
      nofile:
        soft: 1048576
        hard: 1048576
    ports:
      - "8080:8080"   # SEMP / management web UI -> http://localhost:8080 (admin/admin)
      - "45555:55555" # SMF messaging (Solace native) - 55555 is in the macOS ephemeral range, so remap on the host
      - "5673:5672"   # AMQP (remapped: 5672 is taken by RabbitMQ on the host)
      - "1883:1883"   # MQTT
      - "8008:8008"   # Web messaging
      - "9000:9000"   # REST messaging
    environment:
      - username_admin_globalaccesslevel=admin
      - username_admin_password=admin
      - system_scaling_maxconnectioncount=100
    volumes:
      - solace-data:/var/lib/solace
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u admin:admin http://localhost:8080/SEMP/v2/config/about >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # Provisions the same queues on Solace as RabbitMQ, then exits. Runs once the
  # broker is healthy, so both brokers expose an identical set of message stores.
  solace-init:
    image: curlimages/curl:latest
    container_name: demo-solace-init
    depends_on:
      solace:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        set -eu
        SEMP="http://solace:8080/SEMP/v2/config/msgVpns/default/queues"

        provision() {
          q="$$1"
          attempt=1
          max=30
          while :; do
            code=$$(curl -s -u admin:admin -o /tmp/resp.json -w "%{http_code}" \
              -X POST "$$SEMP" \
              -H "Content-Type: application/json" \
              -d "{\"queueName\":\"$$q\",\"accessType\":\"non-exclusive\",\"permission\":\"consume\",\"ingressEnabled\":true,\"egressEnabled\":true}")
            case "$$code" in
              200|201)
                echo "  [$$q] created (HTTP $$code)"
                return 0 ;;
            esac
            if grep -q 'ALREADY_EXISTS' /tmp/resp.json 2>/dev/null; then
              echo "  [$$q] already exists - ok"
              return 0
            fi
            if [ "$$attempt" -ge "$$max" ]; then
              echo "  [$$q] FAILED after $$max attempts (HTTP $$code):"
              cat /tmp/resp.json
              return 1
            fi
            echo "  [$$q] attempt $$attempt failed (HTTP $$code), retrying in 2s..."
            attempt=$$((attempt + 1))
            sleep 2
          done
        }

        rc=0
        for q in sales-orders sales-orders-dlq sales-orders-res; do
          echo "Provisioning Solace queue: $$q"
          provision "$$q" || rc=1
        done
        if [ "$$rc" -ne 0 ]; then
          echo "Solace queue provisioning FAILED." >&2
          exit 1
        fi
        echo "Solace queue provisioning complete."

  # Browser UI for browsing/copying/moving queued messages (e.g. replaying
  # sales-orders-dlq back onto sales-orders) without the broker CLI.
  # https://github.com/SolaceLabs/solace-msg-utility
  #
  # The published image ships the app HTML but NOT its two vendor scripts
  # (the Solace Web Messaging SDK cannot be redistributed inside the image),
  # so this init job downloads them into a volume that the app mounts next to
  # index.html (see the app service below). Without them the UI loads but every
  # Connect fails with "solclient.js not found".
  solace-msg-utility-init:
    image: curlimages/curl:latest
    container_name: demo-solace-msg-utility-init
    user: "0:0"   # write into the fresh named volume (curl's default UID 100 cannot); files land world-readable for the app's UID 65532
    entrypoint:
      - sh
      - -c
      - |
        set -eu
        echo "Downloading solclient.js (Solace Web Messaging SDK, browser build) ..."
        curl -fsSL -o /vendor/solclient.js \
          "https://cdn.jsdelivr.net/npm/solclientjs@10.18.3/lib-browser/solclient.js"
        echo "Downloading jszip.min.js ..."
        curl -fsSL -o /vendor/jszip.min.js \
          "https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"
        echo "Vendor scripts ready."
    volumes:
      - solace-msg-utility-vendor:/vendor

  solace-msg-utility:
    image: ghcr.io/solacelabs/solace-msg-utility:latest
    container_name: demo-solace-msg-utility
    depends_on:
      solace:
        condition: service_healthy
      solace-msg-utility-init:
        condition: service_completed_successfully
    ports:
      - "9444:9443"   # UI -> https://localhost:9444 (self-signed cert; container listens on 9443, remapped since 9443 is commonly already bound on the host, e.g. by Rancher Desktop)
    environment:
      - HOSTED=true
    volumes:
      - solace-msg-utility-tls:/tls
      # Supply the two vendor scripts the app HTML loads, placed NEXT TO index.html
      # (same dir), not under js/. The app's bootstrap latches onto the first
      # `solclient` <script> tag (src="solclient.js", same-dir) and only starts its
      # modules on that tag's `load`; if solclient.js loads only from the js/ fallback
      # the modules never render (empty sidebar). Individual-file subpath mounts keep
      # the image's baked index.html intact.
      - type: volume
        source: solace-msg-utility-vendor
        target: /SolaceMsgUtility/solclient.js
        read_only: true
        volume:
          subpath: solclient.js
      - type: volume
        source: solace-msg-utility-vendor
        target: /SolaceMsgUtility/jszip.min.js
        read_only: true
        volume:
          subpath: jszip.min.js

  # Datadog Agent for observability. Enabled by default — `docker compose up -d`
  # starts it alongside the broker.
  # Requires DD_API_KEY (see datadog/.env.example -> copy to .env).
  #
  # Metrics: the Agent SCRAPES the Ballerina services running on the host
  #   (sales_order_store :9797, sales_order_processor :9798) via host.docker.internal,
  #   configured in datadog/conf.d/prometheus.d/conf.yaml.
  # Traces:  the Ballerina services PUSH OTLP/gRPC spans to the Agent on localhost:4317
  #   (published below). See ../replaying... and each package's Config.toml.
  datadog-agent:
    image: gcr.io/datadoghq/agent:latest
    container_name: demo-datadog-agent
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=${DD_SITE}
      # Required: agent cannot auto-detect hostname inside a container on macOS
      - DD_HOSTNAME=solace-sap-s4hana-dev
      # Enable OTLP ingest — receives traces from the Ballerina Jaeger connector on port 4317
      - DD_OTLP_CONFIG_RECEIVER_PROTOCOLS_GRPC_ENDPOINT=0.0.0.0:4317
      - DD_OTLP_CONFIG_RECEIVER_PROTOCOLS_HTTP_ENDPOINT=0.0.0.0:4318
      # Tag all telemetry with the service name
      - DD_ENV=dev
      - DD_SERVICE=${DD_SERVICE}
      - DD_VERSION=0.1.0
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=false
    ports:
      - "4317:4317"   # OTLP gRPC (traces)
      - "4318:4318"   # OTLP HTTP (optional)
      - "8125:8125/udp"  # StatsD (optional)
    volumes:
      - ./datadog/conf.d:/etc/datadog-agent/conf.d:ro
      - ./logs:/logs:ro

  # OpenSearch for the ICP observability pipeline: Fluent Bit ships the Ballerina
  # services' app.log/metrics.log into it, and the ICP server (running natively, see
  # docs: manage/icp/install-icp.md) queries it for the console's Logs and Metrics
  # pages. Security plugin enabled (the image's bundled demo TLS certs + an admin
  # password) so this isn't wide-open on localhost:9200 - see the doc's Security notes
  # section before using credentials/certs other than the demo ones in this file.
  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: demo-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD:-YourStrong@Pass2026}
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"   # REST API (HTTPS, self-signed demo cert) -> ICP's deployment.toml opensearchUrl
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sfk -u admin:${OPENSEARCH_PASSWORD:-YourStrong@Pass2026} https://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # One-shot: creates the two OpenSearch index templates the ICP observability pipeline
  # needs (application logs + metrics logs), then exits. See
  # docs: manage/icp/observability-setup.md ("Create index templates").
  opensearch-init:
    image: curlimages/curl:latest
    container_name: demo-opensearch-init
    environment:
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD:-YourStrong@Pass2026}
    depends_on:
      opensearch:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        set -eu
        OS="https://opensearch:9200"
        AUTH="admin:$$OPENSEARCH_PASSWORD"

        echo "Creating application log index template..."
        curl -sfk -u "$$AUTH" -X PUT "$$OS/_index_template/wso2_integration_application_log_template" \
          -H "Content-Type: application/json" \
          -d '{
            "index_patterns": ["ballerina-application-logs-*"],
            "template": {
              "mappings": {
                "properties": {
                  "time":          { "type": "date", "format": "yyyy-MM-dd'\''T'\''HH:mm:ss.SSS'\''Z'\''||strict_date_optional_time||epoch_millis" },
                  "message":       { "type": "text" },
                  "icp_runtimeId": { "type": "keyword" }
                }
              }
            }
          }'
        echo

        echo "Creating metrics log index template..."
        curl -sfk -u "$$AUTH" -X PUT "$$OS/_index_template/wso2_integration_metrics_log_template" \
          -H "Content-Type: application/json" \
          -d '{
            "index_patterns": ["ballerina-metrics-logs-*"],
            "template": {
              "mappings": {
                "properties": {
                  "time":                  { "type": "date", "format": "yyyy-MM-dd'\''T'\''HH:mm:ss.SSS'\''Z'\''||strict_date_optional_time||epoch_millis" },
                  "message":               { "type": "text" },
                  "response_time_seconds": { "type": "float" },
                  "response_time":         { "type": "long" }
                }
              }
            }
          }'
        echo

        echo "OpenSearch index templates ready."

  # Tails ../logs/<package>/{app,metrics}.log (written by each package's Config.toml)
  # and ships them to OpenSearch, enriched via ./fluent-bit/scripts/scripts.lua. See
  # ./fluent-bit and docs: manage/icp/observability-setup.md.
  fluent-bit:
    image: fluent/fluent-bit:latest
    container_name: demo-fluent-bit
    environment:
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD:-YourStrong@Pass2026}
    depends_on:
      opensearch-init:
        condition: service_completed_successfully
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./fluent-bit/scripts:/fluent-bit/etc/scripts:ro
      - ./logs:/var/log/ballerina:ro

volumes:
  solace-data:
  solace-msg-utility-tls:
  solace-msg-utility-vendor:
  opensearch-data:
