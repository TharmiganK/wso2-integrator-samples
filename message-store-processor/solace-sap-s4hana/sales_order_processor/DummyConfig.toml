# Configuration for the sales_order_processor package.
# Solace broker is defined in ../docker-compose.yml.
# SAP S/4HANA points at the local mock_sap_endpoint (port 9090).

salesOrderQueueName = "sales-orders"
deadLetterQueueName = "sales-orders-dlq"
salesOrderResQueueName = "sales-orders-res"

# SAP S/4HANA Sales Order service (mock endpoint). Auth is not verified by the mock.
sapS4hanaUserName = "sap-user"
sapS4hanaPassword = "sap-password"
sapS4hanaHostName = "localhost"
sapS4hanaPort = 9090

[salesOrderStoreConfig]
url = "tcp://localhost:45555"
messageVpn = "default"

[salesOrderStoreConfig.auth]
username = "admin"
password = "admin"

[deadLetterStoreConfig]
url = "tcp://localhost:45555"
messageVpn = "default"

[deadLetterStoreConfig.auth]
username = "admin"
password = "admin"

[salesOrderResStoreConfig]
url = "tcp://localhost:45555"
messageVpn = "default"

[salesOrderResStoreConfig.auth]
username = "admin"
password = "admin"

# Human-review workflow runtime. Connects to the Temporal dev server started by
# ../docker-compose.yml (port 7233); the management API (port 8234) is what the
# failed-message-console consumes.
[ballerina.workflow]
mode = "LOCAL"
url = "localhost:7233"
namespace = "default"

[ballerina.workflow.management]
enableManagementApi = true
enableBasicAuth = false

[ballerina.observe]
tracingEnabled = true
tracingProvider = "jaeger"
metricsEnabled = true
metricsReporter = "prometheus"

[ballerinax.prometheus]
port = 9798
host = "0.0.0.0"

[ballerinax.jaeger]
agentHostname = "localhost"
agentPort = 4317
samplerType = "const"
samplerParam = 1.0
reporterFlushInterval = 2000
reporterBufferSize = 1000

[ballerina.log]
format = "json"
keyValues = { service = "sales_order_processor", env = "dev" }

[[ballerina.log.destinations]]
type = "stdout"

[[ballerina.log.destinations]]
path = "../logs/sales_order_processor.log"
