services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: demo-rabbitmq
    hostname: demo-rabbitmq
    ports:
      - "5672:5672"   # AMQP protocol port (used by the Ballerina integration)
      - "15672:15672" # Management UI -> http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      # Enables the management UI plus the Shovel + Shovel Management plugins, so a
      # dead-lettered order can be replayed onto the source queue straight from the
      # web console (Admin -> Shovel Management). See ../replaying-dead-lettered-orders.md
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Datadog Agent for observability. Opt-in via the "observability" profile so the
  # default `docker compose up -d` starts only the broker:
  #   docker compose --profile observability up -d
  # Requires DD_API_KEY (see datadog/.env.example -> copy to .env).
  #
  # Metrics: the Agent SCRAPES the Ballerina services running on the host
  #   (sales_order_store :9797, sales_order_processor :9798) via host.docker.internal,
  #   configured in datadog/conf.d/prometheus.d/conf.yaml.
  # Traces:  the Ballerina services PUSH OTLP/gRPC spans to the Agent on localhost:4317
  #   (published below). See ../replaying... and each package's Config.toml.
  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    container_name: demo-datadog-agent
    profiles: ["observability"]
    environment:
      # Set DD_API_KEY in .env (copy datadog/.env.example). Left optional so the default
      # `docker compose up -d` (broker only, no observability profile) works without a key;
      # when the profile is enabled the Agent needs a real key or it will log an auth error.
      - DD_API_KEY=${DD_API_KEY:-}
      - DD_SITE=datadoghq.com
      - DD_ENV=dev
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_OTLP_CONFIG_RECEIVER_PROTOCOLS_GRPC_ENDPOINT=0.0.0.0:4317
    ports:
      - "4317:4317"   # OTLP gRPC (Ballerina jaeger/OpenTelemetry exporter pushes here)
      - "8126:8126"   # APM / trace intake
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets the Agent reach host services (Linux); no-op on Docker Desktop
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./datadog/conf.d/prometheus.d/conf.yaml:/etc/datadog-agent/conf.d/prometheus.d/conf.yaml:ro

volumes:
  rabbitmq-data:
