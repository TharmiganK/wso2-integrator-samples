services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: demo-rabbitmq
    hostname: demo-rabbitmq
    ports:
      - "5672:5672"   # AMQP protocol port (used by the Ballerina integration)
      - "15672:15672" # Management UI -> http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      # Enables the management UI plus the Shovel + Shovel Management plugins, so a
      # dead-lettered order can be replayed onto the source queue straight from the
      # web console (Admin -> Shovel Management). See ../replaying-dead-lettered-orders.md
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Durable backend for the sales_order_processor's human-review workflows. This
  # is the single-container Temporal dev server (in-memory, no external DB) — the
  # processor connects to it on 7233 when run with Config.local.toml.
  temporal:
    image: temporalio/temporal:latest
    container_name: demo-temporal
    command: ["server", "start-dev", "--ip", "0.0.0.0"]
    ports:
      - "7233:7233"   # gRPC frontend (used by the workflow runtime in LOCAL mode)
      - "8233:8233"   # Temporal Web UI -> http://localhost:8233

volumes:
  rabbitmq-data:
