# Configuration for the sales_order_store package.
# Connects to the RabbitMQ broker defined in ../docker-compose.yml.

salesOrderQueueName = "sales-orders"

[salesOrderStoreConfig]
host = "localhost"
port = 5672

[salesOrderStoreConfig.connectionData]
username = "guest"
password = "guest"
virtualHost = "/"

[ballerina.observe]
tracingEnabled = true
tracingProvider = "jaeger"
metricsEnabled = true
metricsReporter = "prometheus"

[ballerinax.prometheus]
port = 9797
host = "0.0.0.0"

[ballerinax.jaeger]
agentHostname = "localhost"
agentPort = 4317
samplerType = "const"
samplerParam = 1.0
reporterFlushInterval = 2000
reporterBufferSize = 1000

[ballerina.log]
format = "json"
keyValues = { service = "sales_order_store", env = "dev" }

[[ballerina.log.destinations]]
type = "stdout"

[[ballerina.log.destinations]]
path = "../logs/sales_order_store.log"
